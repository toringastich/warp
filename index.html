<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warp — Matrix Visualizer</title>
    <meta
      name="description"
      content="A Desmos-style sandbox for linear algebra. Type a matrix and watch space warp — in 2D and 3D, with eigenvectors, determinants, symbolic algebra in x, y, z, and shareable URLs. No backend."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://warp.us.com/" />
    <meta name="theme-color" content="#2d70b3" />

    <!-- Social previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://warp.us.com/" />
    <meta property="og:title" content="Warp — Type a matrix. Watch space warp." />
    <meta
      property="og:description"
      content="A Desmos-style sandbox for linear algebra in 2D and 3D: eigenvectors, determinants, symbolic algebra in x, y, z, divergence & curl, shareable URLs. Fully client-side."
    />
    <meta property="og:image" content="https://warp.us.com/social-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Warp — Type a matrix. Watch space warp." />
    <meta
      name="twitter:description"
      content="A Desmos-style sandbox for linear algebra in 2D and 3D — eigenvectors, determinants, symbolic algebra, shareable URLs."
    />
    <meta name="twitter:image" content="https://warp.us.com/social-card.png" />

    <!-- GoatCounter analytics: privacy-friendly, no cookies, and count.js
         skips localhost so dev work never pollutes the numbers. -->
    <script
      data-goatcounter="https://warpus.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
